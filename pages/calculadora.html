<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trote Solidário - UniFACEF</title>
    <link rel="stylesheet" href="/index.css">
    <script src="https://kit.fontawesome.com/c88dfd05fd.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- HEADER -->
    <header class="header-container">
        <nav class="nav-bar">
            <a class="logo" href="/">Trote 2026</a>
            <input type="checkbox" id="check">
            <label for="check" class="icons">
                <i class="fa-solid fa-bars" id="menu-icon"></i>
                <i class="fa-solid fa-x" id="close-icon"></i>
            </label>
            <ul class="nav-list">
                <li><a href="/">Início</a></li>
                <li><a href="/pages/introdução.html">Introdução</a></li>
                <li><a href="/pages/formato.html">Formato</a></li>
                <li><a href="/pages/equipes.html">Equipes</a></li>
                <li><a href="/pages/provas-e-metas.html">Provas & Metas</a></li>
                <li><a href="/pages/integração.html">Integração</a></li>
                <li><a href="/pages/cronograma.html">Cronograma</a></li>
                <li><a href="/pages/calculadora.html">Calcuadora</a></li>
            </ul>
        </nav>
    </header>
    <main class="main">
        <section class="card-container">
            <h2 class="card-title">Selecione a sua equipe:</h2>
            <select class="teams-select" name="equipes" id="teams-select">
                <option value="amarelo">Amarelo</option>
                <option value="cinza">Cinza</option>
                <option value="laranja">Laranja</option>
                <option value="marrom">Marrom</option>
                <option value="Preto">Preto</option>
            </select>
        </section>
        <section class="card-container">
            <h2 class="card-title"><i class="fa-solid fa-calculator"></i> Simulador de Pontos - Itens Avulsos</h2>
            <div class="inputs-container">
                <div class="input-group">
                    <label for="">Arroz (5Kg) - 10 pts</label>
                    <input type="number" id="rice" min="0">
                </div>
                <div class="input-group">
                    <label for="">Feijão  (2Kg) - 8 pts</label>
                    <input type="number" id="beans" min="0">
                </div>
                <div class="input-group">
                    <label for="">Óleo de Soja (1 un) - 4 pts</label>
                    <input type="number" id="oil" min="0">
                </div>
                <div class="input-group">
                    <label for="">Macarrão (500g) - 2 pts</label>
                    <input type="number" id="pasta" min="0">
                </div>
        </section>
        <section class="card-container">
            <h2 class="card-title"><i class="fa-solid fa-calculator"></i> Simulador de Metas</h2>
            <div class="inputs-container">
                <div class="input-group">
                    <label for="kits">Kits de alimentação (60 kits)</label>
                    <input type="number" id="kits" min="0">
                </div>
                <div class="input-group">
                    <label for="milk">Leite (60 caixas)</label>
                    <input type="number" id="milk" min="0">
                </div>
                <div class="input-group">
                    <label for="suple">Suplemento (30 latas)</label>
                    <input type="number" id="suple" min="0">
                </div>
                <div class="input-group">
                    <label for="blood">Doação de Sangue (30 doações)</label>
                    <input type="number" id="blood" min="0">
                </div>
        </section>
        <section class="card-container">
            <button class="btn-re" onclick="calcularpts()"><h2 class="card-title">TOTAL</h2></button>
            </div>
            <div class="resultado">
                Pontuação total:
            </div>
        </section>
    </main>
<script src="/script.js"></script>
</body>

</html>
